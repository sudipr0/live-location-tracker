<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⛧ ACCESS_GRANTED · v3.0</title>

    <!-- Google Font: Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ============================================================
               CYBERPUNK / HACKER VARIABLES
            ============================================================ */
        :root {
            --bg-primary: #0a0a0e;
            --bg-card: rgba(0, 255, 204, 0.04);
            --border-neon: #00ffcc;
            --border-neon-dim: rgba(0, 255, 204, 0.15);
            --border-magenta: #ff00ff;
            --text-primary: #b0f0e6;
            --text-secondary: #7ae0d0;
            --text-muted: #4a8a82;
            --glow-cyan: 0 0 20px rgba(0, 255, 204, 0.25);
            --glow-cyan-strong: 0 0 40px rgba(0, 255, 204, 0.35);
            --glow-magenta: 0 0 24px rgba(255, 0, 255, 0.2);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --font: 'Fira Code', 'Courier New', monospace;
            --transition: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            --perspective: 1000px;
        }

        /* ============================================================
               RESET & BASE
            ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================================
               ANIMATED BACKGROUND – PARTICLES + GRID + ORBS
            ============================================================ */

        /* ---- Canvas for particles ---- */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        /* ---- Grid overlay ---- */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 255, 204, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.025) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 14s linear infinite;
            opacity: 0.6;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* ---- Floating neon orbs ---- */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 20s ease-in-out infinite alternate;
            will-change: transform;
        }
        .bg-orb--1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -150px;
            background: #00ffcc;
            opacity: 0.08;
            animation-delay: 0s;
        }
        .bg-orb--2 {
            width: 400px;
            height: 400px;
            bottom: -160px;
            left: -120px;
            background: #ff00ff;
            opacity: 0.06;
            animation-delay: -7s;
        }
        .bg-orb--3 {
            width: 350px;
            height: 350px;
            top: 40%;
            right: 10%;
            background: #ffaa00;
            opacity: 0.04;
            animation-delay: -14s;
        }
        .bg-orb--4 {
            width: 300px;
            height: 300px;
            bottom: 20%;
            left: 30%;
            background: #0077ff;
            opacity: 0.05;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            25% {
                transform: translate(60px, -70px) scale(1.2) rotate(5deg);
            }
            50% {
                transform: translate(-40px, 40px) scale(0.85) rotate(-3deg);
            }
            75% {
                transform: translate(30px, -20px) scale(1.1) rotate(4deg);
            }
            100% {
                transform: translate(-20px, 30px) scale(0.95) rotate(-2deg);
            }
        }

        /* ---- Scanlines ---- */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent 0px,
                    transparent 3px,
                    rgba(0, 255, 200, 0.005) 3px,
                    rgba(0, 255, 200, 0.005) 4px);
        }

        /* ---- Vignette ---- */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
        }

        /* ============================================================
               MAIN WRAPPER – 3D PERSPECTIVE
            ============================================================ */
        .login-wrapper {
            position: relative;
            z-index: 2;
            display: grid;
            place-items: center;
            height: 100vh;
            padding: 1.5rem;
            perspective: var(--perspective);
        }

        /* ============================================================
               3D CARD – with animated rotating border
            ============================================================ */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border: 1px solid var(--border-neon-dim);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2.25rem 2.25rem;
            box-shadow: var(--glow-cyan), 0 30px 60px -20px rgba(0, 0, 0, 0.9);
            transition: transform 0.1s ease, box-shadow 0.4s ease;
            transform-style: preserve-3d;
            will-change: transform;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Animated border spin */
        .login-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-lg);
            padding: 2px;
            background: conic-gradient(from 0deg, transparent, var(--border-neon), transparent, var(--border-magenta), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderSpin 6s linear infinite;
        }

        @keyframes borderSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Inner glow overlay */
        .login-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: radial-gradient(circle at 30% 20%, rgba(0, 255, 204, 0.04), transparent 70%);
            pointer-events: none;
        }

        /* Neon border glow on hover */
        .login-card:hover {
            border-color: var(--border-neon);
            box-shadow: var(--glow-cyan-strong), var(--glow-magenta), 0 30px 60px -20px rgba(0, 0, 0, 0.9);
        }

        /* ============================================================
               CARD CONTENT – all children inherit 3D space
            ============================================================ */
        .login-card > * {
            transform-style: preserve-3d;
            backface-visibility: hidden;
            position: relative;
            z-index: 2;
        }

        /* ============================================================
               TERMINAL PROMPT (top of card)
            ============================================================ */
        .term-prompt {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 255, 204, 0.06);
        }

        .term-prompt .prompt-symbol {
            color: var(--border-neon);
            text-shadow: 0 0 12px rgba(0, 255, 204, 0.3);
            animation: symbolPulse 2s ease-in-out infinite;
        }

        @keyframes symbolPulse {
            0%,
            100% {
                text-shadow: 0 0 12px rgba(0, 255, 204, 0.3);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 255, 204, 0.6), 0 0 60px rgba(0, 255, 204, 0.1);
            }
        }

        .term-prompt .prompt-text {
            color: var(--text-secondary);
        }

        .term-prompt .blink-cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--border-neon);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ============================================================
               ICON – 3D floating with pulse
            ============================================================ */
        .login-icon {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, #00ffcc, #ff00ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #0a0a0e;
            margin: 0 auto 0.8rem;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3), 0 0 60px rgba(255, 0, 255, 0.15);
            transition: var(--transition);
            transform: translateZ(20px);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(0, 255, 204, 0.3), 0 0 60px rgba(255, 0, 255, 0.15);
            }
            50% {
                box-shadow: 0 0 50px rgba(0, 255, 204, 0.5), 0 0 80px rgba(255, 0, 255, 0.25);
            }
        }

        .login-icon:hover {
            transform: translateZ(40px) scale(1.05);
            animation-play-state: paused;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.4), 0 0 80px rgba(255, 0, 255, 0.2);
        }

        /* ============================================================
               TITLE – glitch effect
            ============================================================ */
        .login-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            margin-bottom: 0.1rem;
            transform: translateZ(10px);
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .login-title .glitch {
            position: relative;
            display: inline-block;
        }
        .login-title .glitch::before,
        .login-title .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.7;
        }
        .login-title .glitch::before {
            color: #ff00ff;
            z-index: -1;
            animation: glitch1 2.5s infinite;
        }
        .login-title .glitch::after {
            color: #00ffcc;
            z-index: -2;
            animation: glitch2 2.5s infinite;
        }
        @keyframes glitch1 {
            0%,
            100% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(2px, -2px);
            }
            60% {
                transform: translate(-1px, -1px);
            }
            80% {
                transform: translate(1px, 2px);
            }
        }
        @keyframes glitch2 {
            0%,
            100% {
                transform: translate(0);
            }
            20% {
                transform: translate(2px, -2px);
            }
            40% {
                transform: translate(-2px, 2px);
            }
            60% {
                transform: translate(1px, 1px);
            }
            80% {
                transform: translate(-1px, -2px);
            }
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 1.8rem;
            letter-spacing: 0.06em;
            transform: translateZ(5px);
            animation: subtitlePulse 3s ease-in-out infinite;
        }

        @keyframes subtitlePulse {
            0%,
            100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        /* ============================================================
               FORM FIELDS – neon glow on focus
            ============================================================ */
        .field {
            margin-bottom: 1.2rem;
            position: relative;
            transform: translateZ(5px);
        }

        .field .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: var(--transition);
            pointer-events: none;
            z-index: 2;
        }

        .field .input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            background: rgba(0, 255, 204, 0.02);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 400;
            transition: var(--transition);
            outline: none;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .field .input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.04em;
            opacity: 0.6;
        }

        .field .input:focus {
            border-color: var(--border-neon);
            background: rgba(0, 255, 204, 0.04);
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.08), inset 0 2px 8px rgba(0, 0, 0, 0.5);
            transform: translateZ(8px);
        }

        .field .input:focus~.input-icon {
            color: var(--border-neon);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .field .input.error {
            border-color: #ff00ff;
            box-shadow: 0 0 0 3px rgba(255, 0, 255, 0.15);
        }

        /* ============================================================
               SUBMIT BUTTON – 3D neon with shimmer
            ============================================================ */
        .btn-login {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.15), rgba(255, 0, 255, 0.1));
            border: 1px solid var(--border-neon);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            margin-top: 0.6rem;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transform: translateZ(10px);
            text-transform: uppercase;
        }

        /* Shimmer overlay */
        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-sm);
            background: linear-gradient(105deg,
                    transparent 30%,
                    rgba(0, 255, 204, 0.05) 45%,
                    rgba(255, 0, 255, 0.03) 55%,
                    transparent 70%);
            background-size: 200% 100%;
            animation: shimmer 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .btn-login:hover {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.2), rgba(255, 0, 255, 0.15));
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.25), 0 8px 32px rgba(0, 0, 0, 0.5);
            transform: translateZ(20px) translateY(-2px);
            border-color: var(--border-magenta);
        }

        .btn-login:active {
            transform: translateZ(5px) scale(0.97);
        }

        .btn-login .btn-arrow {
            transition: var(--transition);
        }

        .btn-login:hover .btn-arrow {
            transform: translateX(6px);
        }

        /* ============================================================
               FOOTER – hacker style
            ============================================================ */
        .login-footer {
            text-align: center;
            margin-top: 1.6rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            transform: translateZ(5px);
        }

        .login-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
            border-bottom: 1px solid transparent;
        }

        .login-footer a:hover {
            color: var(--border-neon);
            border-bottom-color: var(--border-neon);
            text-shadow: 0 0 16px rgba(0, 255, 204, 0.2);
        }

        .login-footer .divider {
            display: inline-block;
            margin: 0 0.6rem;
            opacity: 0.3;
        }

        .login-footer .hacker-tag {
            color: var(--border-neon);
            opacity: 0.4;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            animation: tagPulse 3s ease-in-out infinite;
        }

        @keyframes tagPulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* ============================================================
               ANIMATIONS – fade up with 3D rotation
            ============================================================ */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px) rotateX(10deg) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0) scale(1);
            }
        }

        /* ============================================================
               LOADING STATE (on submit)
            ============================================================ */
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-login.loading .btn-text {
            visibility: hidden;
        }

        .btn-login.loading .btn-text::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(0, 255, 204, 0.2);
            border-top-color: var(--border-neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            top: 50%;
            left: 50%;
            margin: -11px 0 0 -11px;
            visibility: visible;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        .btn-login .btn-text {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
               RESPONSIVE
            ============================================================ */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.75rem 1.25rem 1.5rem;
                border-radius: var(--radius-md);
                max-width: 100%;
            }
            .login-card::before {
                border-radius: var(--radius-md);
            }
            .login-card::after {
                border-radius: var(--radius-md);
            }
            .login-icon {
                width: 56px;
                height: 56px;
                font-size: 1.4rem;
            }
            .login-title {
                font-size: 1.3rem;
            }
            .login-subtitle {
                font-size: 0.7rem;
                margin-bottom: 1.2rem;
            }
            .field .input {
                padding: 0.7rem 1rem 0.7rem 2.5rem;
                font-size: 0.8rem;
            }
            .field .input-icon {
                left: 12px;
                font-size: 0.8rem;
            }
            .btn-login {
                padding: 0.8rem;
                font-size: 0.8rem;
            }
            .login-footer {
                font-size: 0.6rem;
                margin-top: 1.2rem;
            }
            .term-prompt {
                font-size: 0.6rem;
            }
            .bg-orb--1 {
                width: 300px;
                height: 300px;
                top: -120px;
                right: -100px;
            }
            .bg-orb--2 {
                width: 250px;
                height: 250px;
                bottom: -100px;
                left: -80px;
            }
            .bg-orb--3 {
                width: 200px;
                height: 200px;
            }
            .bg-orb--4 {
                width: 180px;
                height: 180px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 1.25rem 0.9rem 1.25rem;
            }
            .login-icon {
                width: 46px;
                height: 46px;
                font-size: 1.2rem;
                margin-bottom: 0.5rem;
            }
            .login-title {
                font-size: 1.1rem;
            }
            .field .input {
                font-size: 0.75rem;
                padding: 0.6rem 1rem 0.6rem 2.2rem;
            }
            .field .input-icon {
                font-size: 0.7rem;
                left: 10px;
            }
            .btn-login {
                font-size: 0.75rem;
                padding: 0.65rem;
            }
        }

        /* ============================================================
               REDUCED MOTION
            ============================================================ */
        @media (prefers-reduced-motion: reduce) {
            #particleCanvas {
                display: none;
            }
            .bg-grid {
                animation: none;
            }
            .bg-orb {
                animation: none;
            }
            .login-card {
                animation: none;
            }
            .login-card::before {
                animation: none;
            }
            .login-title .glitch::before,
            .login-title .glitch::after {
                animation: none;
            }
            .btn-login .btn-arrow {
                transition: none;
            }
            .btn-login:hover .btn-arrow {
                transform: none;
            }
            .btn-login::before {
                animation: none;
            }
            .term-prompt .prompt-symbol {
                animation: none;
            }
            .login-icon {
                animation: none;
            }
            .login-subtitle {
                animation: none;
            }
            .login-footer .hacker-tag {
                animation: none;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ANIMATED BACKGROUND ===== -->
    <canvas id="particleCanvas"></canvas>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-orb bg-orb--4"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- ===== LOGIN WRAPPER ===== -->
    <div class="login-wrapper">
        <div class="login-card" id="card3d">

            <!-- Terminal prompt line -->
            <div class="term-prompt">
                <span class="prompt-symbol">⛧</span>
                <span class="prompt-text">root@access ~ %</span>
                <span class="blink-cursor"></span>
            </div>

            <!-- Icon -->
            <div class="login-icon">
                <i class="fas fa-terminal"></i>
            </div>

            <!-- Title with glitch -->
            <h1 class="login-title">
                <span class="glitch" data-text="LOGIN">LOGIN</span>
            </h1>
            <p class="login-subtitle">// authenticate to continue</p>

            <!-- ===== FORM ===== -->
            <form action="/login" method="post" id="loginForm" autocomplete="off">

                <!-- Username -->
                <div class="field">
                    <input
                    type="text"
                    class="input"
                    placeholder="username"
                    required
                    name="username"
                    id="username"
                    autocomplete="username"
                    />
                    <i class="fas fa-user input-icon"></i>
                </div>

                <!-- Password -->
                <div class="field">
                    <input
                    type="password"
                    class="input"
                    placeholder="password"
                    required
                    name="password"
                    id="password"
                    autocomplete="current-password"
                    />
                    <i class="fas fa-key input-icon"></i>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">
                        <span>Access</span>
                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </span>
                </button>

            </form>

            <!-- Footer -->
            <div class="login-footer">
                <span>encrypted</span>
                <span class="divider">•</span>
                <a href="#" tabindex="-1">forgot?</a>
                <span class="divider">•</span>
                <span class="hacker-tag">#cyber</span>
            </div>

        </div>
    </div>

    <!-- ============================================================
    SCRIPT – particle system + 3D tilt + loading state
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. PARTICLE SYSTEM – animated background (120 particles, same as homepage)
            // ============================================================
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let W, H;
            let particles = [];
            const PARTICLE_COUNT = 120; // Matches homepage
            const CONNECTION_DIST = 140;
            const MOUSE_RADIUS = 160;

            let mouseX = -9999;
            let mouseY = -9999;
            let mouseActive = false;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2.5 + 1.2;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.hue = Math.random() > 0.5 ? 170 : 290;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (mouseActive) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MOUSE_RADIUS && dist > 0) {
                            const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * 0.3;
                            this.x += (dx / dist) * force;
                            this.y += (dy / dist) * force;
                        }
                    }

                    if (this.x < 0) this.x = W;
                    if (this.x > W) this.x = 0;
                    if (this.y < 0) this.y = H;
                    if (this.y > H) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    const color = this.hue === 170 ? '0, 255, 204' : '255, 0, 255';
                    ctx.fillStyle = `rgba(${color}, ${this.opacity})`;
                    ctx.shadowColor = this.hue === 170 ? 'rgba(0,255,204,0.15)' : 'rgba(255,0,255,0.1)';
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }
            initParticles();

            window.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mouseActive = true;
            });
            window.addEventListener('mouseleave', function() {
                mouseActive = false;
            });
            window.addEventListener('touchmove', function(e) {
                const touch = e.touches[0];
                if (touch) {
                    mouseX = touch.clientX;
                    mouseY = touch.clientY;
                    mouseActive = true;
                }
            }, { passive: true });
            window.addEventListener('touchend', function() {
                mouseActive = false;
            });

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONNECTION_DIST) {
                            const alpha = (1 - dist / CONNECTION_DIST) * 0.2;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(0, 255, 204, ${alpha})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                for (const p of particles) {
                    p.update();
                    p.draw();
                }
                drawConnections();
                requestAnimationFrame(animate);
            }
            animate();

            // ============================================================
            // 2. 3D TILT on card
            // ============================================================
            const card = document.getElementById('card3d');
            const wrapper = document.querySelector('.login-wrapper');

            function handleTilt(e) {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -6;
                const rotateY = ((x - centerX) / centerX) * 6;
                card.style.transform =
                    `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
            }

            function resetTilt() {
                card.style.transform = 'rotateX(0deg) rotateY(0deg) translateZ(0)';
            }

            if (window.matchMedia('(hover: hover)').matches) {
                wrapper.addEventListener('mousemove', handleTilt);
                wrapper.addEventListener('mouseleave', resetTilt);
            }

            // ============================================================
            // 3. FORM LOGIC
            // ============================================================
            const form = document.getElementById('loginForm');
            const btn = document.getElementById('loginBtn');
            const btnText = btn.querySelector('.btn-text');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            form.addEventListener('submit', function(e) {
                if (btn.classList.contains('loading')) {
                    e.preventDefault();
                    return;
                }

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    e.preventDefault();
                    const fields = [usernameInput, passwordInput];
                    fields.forEach(f => {
                        if (!f.value.trim()) {
                            f.classList.add('error');
                            setTimeout(() => {
                                f.classList.remove('error');
                            }, 1200);
                        }
                    });
                    return;
                }

                btn.classList.add('loading');
                btn.querySelector('.btn-arrow').style.opacity = '0';
                btnText.innerHTML = '<span>Authenticating…</span>';
            });

            window.addEventListener('pageshow', function(e) {
                if (e.persisted) {
                    btn.classList.remove('loading');
                    btn.querySelector('.btn-arrow').style.opacity = '';
                    btnText.innerHTML = '<span>Access</span><i class="fas fa-arrow-right btn-arrow"></i>';
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const active = document.activeElement;
                    if (active && (active.id === 'username' || active.id === 'password')) {
                        active.value = '';
                        active.blur();
                    }
                }
            });

            if (window.innerWidth >= 480) {
                usernameInput.focus();
            }

            window.addEventListener('orientationchange', function() {
                setTimeout(resize, 300);
            });

            console.log('⛧ Login interface ready — animated cyber style v3.0 (matches homepage)');
        })();
    </script>

</body>
</html>
